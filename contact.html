<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - LogicMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">Logic<span class="text-blue-500">Master</span></h1>
            <div class="space-x-6">
                <a href="index.html" class="hover:text-blue-400 transition-all">Accueil</a>
                <a href="cours.html" class="hover:text-blue-400 transition-all">Cours</a>
                <a href="quiz.html" class="hover:text-blue-400 transition-all">Quiz</a>
                <a href="about.html" class="hover:text-blue-400 transition-all">À Propos</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-16 px-4 max-w-lg">
        <div class="bg-white rounded-2xl shadow-2xl p-8 border-b-8 border-blue-600">
            <h2 class="text-3xl font-bold text-slate-900 mb-2">Contactez-nous</h2>
            <p class="text-slate-500 mb-8 font-medium">Une question sur le projet S2 ? Écrivez-nous.</p>

            <form id="contactForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Nom complet</label>
                    <input type="text" id="name" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        placeholder="Ex: Mohamed Amine">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        placeholder="nom@student.fssm.ma">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Message</label>
                    <textarea id="message" rows="4" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all"
                        placeholder="Votre message ici..."></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
                    Envoyer le message
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Empêcher le rechargement de la page
            
            const name = document.getElementById('name').value;
            
            // Simulation d'envoi
            alert("Merci " + name + " ! Votre message a été simulé avec succès. (Projet Académique S2)");
            
            this.reset(); // Vider le formulaire
        });
    </script>

</body>
</html>
