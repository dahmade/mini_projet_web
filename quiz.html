<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Algorithmique - LogicMaster</title>
    <script src="./js/tailwind.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">Logic<span class="text-blue-500">Master</span></h1>
            <a href="index.html" class="hover:text-blue-400 transition-all font-medium">Quitter le Quiz</a>
        </div>
    </nav>

    <main class="container mx-auto mt-10 max-w-3xl px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8">

            <div id="timer-display" class="text-xl font-mono font-bold text-red-500 bg-red-50 px-4 py-2 rounded-lg border border-red-200">
                02:00
            </div><br>

            <div class="w-full bg-slate-200 h-2 rounded-full mb-8">
                <div id="progress" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div id="quiz-header">
                <h2 id="question-text" class="text-2xl font-bold mt-2 mb-8 text-slate-800">
                    Chargement de la question...
                </h2>
            </div>

            <div id="answer-options" class="grid grid-cols-1 gap-4">
                </div>

            <div class="mt-10 pt-6 border-t border-slate-100 flex justify-between items-center">
                <p id="score-display" class="font-bold text-blue-600 text-lg">Score: 0</p>
                <div class="text-sm text-slate-400 font-mono">FSSM - Projet S2</div>
            </div>
        </div>
    </main>

    <script src="js/quiz-logic.js"></script>

</body>
</html>
